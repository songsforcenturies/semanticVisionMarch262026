version: '3.8'

services:
  backend:
    build: ./backend
    container_name: sv-backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8001:8001"
    volumes:
      - backend-uploads:/app/uploads
    networks:
      - sv-network

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: /api
    container_name: sv-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - sv-network

volumes:
  backend-uploads:

networks:
  sv-network:
    driver: bridge
